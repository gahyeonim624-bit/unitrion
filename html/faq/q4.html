        <div class="faq-answer">
          <p>언제든 가입하실 수 있지만, 설립 초기 조합원의 '수'는 사측의 태도를 바꾸고 우리의 요구를 관철시키는 가장 강력한 무기입니다.</p>
          <p>불합리한 처우를 하루빨리 개선하고 정당한 보상 체계를 세우기 위해서는 초기부터 많은 분들이 모여주셔야 합니다.</p>
          <p>우리의 당연한 권리를 되찾는 길에 지금 당장 동참해 주시길 부탁드립니다.</p>
