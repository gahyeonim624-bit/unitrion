      </div>

      <div class="page-body">
        <div class="faq-answer">
          <p>집행부는 노조 활동을 기획하고 추진하는 역할에 직접 참여하게 됩니다.</p>
          <p>조합원들의 의견을 취합하거나 배포 내용을 만드는 등 동아리 스태프와 같은 실무를 담당하는 든든한 심부름꾼이라 봐주시면 됩니다.</p>
          <p>또한 향후 사측과 진행할 단체교섭에 노조를 대표하여 참여해 요구안을 관철시키기 위해 뛸 예정이니, 힘을 보태고 싶은 분들의 많은 지원 바랍니다.</p>
