        <h1 class="page-title">노동조합에 가입하면 회사가 불이익을 주진 않을까요?</h1>
      </div>

      <div class="page-body">
        <div class="faq-answer">
          <p>노조 활동을 이유로 한 불이익은 법으로 엄격히 금지된 '부당노동행위'입니다.</p>
          <p>혼자 부조리를 이야기하면 표적이 될 수 있지만, 우리가 단단하게 뭉치면 회사가 함부로 대할 수 없는 강력한 교섭력이 생깁니다.</p>
          <p>집행부가 앞장서서 직원 한 분 한 분이 부당한 대우를 받지 않도록 철저히 방어하고 싸우겠습니다.</p>
